<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products | Invex Inventory</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <style>
    .products-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .form-control {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      outline: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .product-info {
      display: flex;
      flex-direction: column;
    }

    .product-name {
      font-weight: 600;
      color: var(--text-primary);
    }

    .product-sku {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .stock-badge {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .stock-in { background: rgba(16, 185, 129, 0.1); color: var(--accent-success); }
    .stock-low { background: rgba(245, 158, 11, 0.1); color: var(--accent-warning); }
    .stock-out { background: rgba(239, 68, 68, 0.1); color: var(--accent-danger); }

    .action-btn {
      padding: 6px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
  </style>
</head>

  <main class="main-content">
    <header class="top-header">
      <div class="header-title">
        <h1>Products</h1>
        <p>Manage your inventory catalog.</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" id="new-product-btn">+ Add Product</button>
      </div>
    </header>

    <div class="search-bar">
      <input type="text" id="search-input" class="form-control" style="max-width: 300px;" placeholder="Search name or SKU...">
      <select id="filter-category" class="form-control" style="max-width: 200px;">
        <option value="">All Categories</option>
      </select>
      <select id="filter-supplier" class="form-control" style="max-width: 200px;">
        <option value="">All Suppliers</option>
      </select>
    </div>

    <section class="card">
      <table id="products-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="products-table-body">
          <!-- Data will be loaded here -->
        </tbody>
      </table>
      <div id="loading-state" style="text-align: center; padding: 40px; color: var(--text-muted);">Loading catalog...</div>
    </section>
  </main>

  <!-- Product Modal -->
  <div class="modal" id="product-modal">
    <div class="modal-content">
      <div class="modal-header" style="margin-bottom: 24px;">
        <h2 id="modal-title">Add New Product</h2>
      </div>
      <form id="product-form">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label for="name">Product Name</label>
          <input type="text" id="name" class="form-control" required placeholder="e.g. Wireless Mouse M1">
        </div>
        <div class="form-group">
          <label for="sku">SKU / Item Code</label>
          <input type="text" id="sku" class="form-control" required placeholder="e.g. WM-001">
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="category_id">Category</label>
            <select id="category_id" class="form-control" required>
              <option value="">Select Category</option>
            </select>
          </div>
          <div class="form-group">
            <label for="supplier_id">Supplier</label>
            <select id="supplier_id" class="form-control" required>
              <option value="">Select Supplier</option>
            </select>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="unit_price">Unit Price ($)</label>
            <input type="number" id="unit_price" class="form-control" required step="0.01" min="0">
          </div>
          <div class="form-group">
            <label for="reorder_level">Reorder Level</label>
            <input type="number" id="reorder_level" class="form-control" required min="0" value="10">
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="unit_of_measure">Unit of Measure</label>
            <input type="text" id="unit_of_measure" class="form-control" required value="pcs">
          </div>
          <div class="form-group" style="display: flex; align-items: center; gap: 8px; padding-top: 25px;">
            <input type="checkbox" id="track_expiry">
            <label for="track_expiry" style="margin: 0;">Track Expiry Dates</label>
          </div>
        </div>

        <div class="modal-footer" style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px;">
          <button type="button" class="btn" style="background: var(--bg-hover);" id="cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="save-btn">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/sidebar.js"></script>
  <script>
    const tableBody = document.getElementById('products-table-body');
    const loadingState = document.getElementById('loading-state');
    const modal = document.getElementById('product-modal');
    const form = document.getElementById('product-form');
    
    const categoryFilter = document.getElementById('filter-category');
    const supplierFilter = document.getElementById('filter-supplier');
    const searchInput = document.getElementById('search-input');

    async function loadProducts() {
      const token = sessionStorage.getItem('token');
      const params = new URLSearchParams();
      if (searchInput.value) params.append('search', searchInput.value);
      if (categoryFilter.value) params.append('category_id', categoryFilter.value);
      if (supplierFilter.value) params.append('supplier_id', supplierFilter.value);

      try {
        const res = await fetch(`/api/products?${params.toString()}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        
        loadingState.style.display = 'none';
        if (data.success) {
          tableBody.innerHTML = '';
          data.data.forEach(p => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td>
                <div class="product-info">
                  <span class="product-name">${p.name}</span>
                  <span class="product-sku">${p.sku}</span>
                </div>
              </td>
              <td>${p.category_name}</td>
              <td>$${parseFloat(p.unit_price).toFixed(2)}</td>
              <td><span class="stock-badge stock-in">Fetching...</span></td>
              <td>
                <button class="action-btn edit-btn" data-id="${p.id}">✏️</button>
                <button class="action-btn delete-btn" data-id="${p.id}">🗑️</button>
              </td>
            `;
            tableBody.appendChild(row);
            fetchStock(p.id, row.cells[3].querySelector('.stock-badge'), p.reorder_level);
          });
        }
      } catch (err) {
        loadingState.textContent = 'Failed to load products.';
      }
    }

    async function fetchStock(productId, badge, reorderLevel) {
      const token = sessionStorage.getItem('token');
      try {
        const res = await fetch(`/api/products/${productId}/stock`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success) {
          const total = data.data.reduce((sum, loc) => sum + parseInt(loc.quantity), 0);
          badge.textContent = `${total} in stock`;
          badge.classList.remove('stock-in');
          if (total === 0) badge.classList.add('stock-out');
          else if (total <= reorderLevel) badge.classList.add('stock-low');
          else badge.classList.add('stock-in');
        }
      } catch (err) { badge.textContent = 'Error'; }
    }

    async function loadFilters() {
      const token = sessionStorage.getItem('token');
      const headers = { 'Authorization': `Bearer ${token}` };
      
      const cRes = await fetch('/api/categories', { headers });
      const cData = await cRes.json();
      if (cData.success) {
        cData.data.forEach(c => {
          const opt = new Option(c.name, c.id);
          categoryFilter.add(opt.cloneNode(true));
          document.getElementById('category_id').add(opt);
        });
      }

      const sRes = await fetch('/api/suppliers', { headers });
      const sData = await sRes.json();
      if (sData.success) {
        sData.data.forEach(s => {
          const opt = new Option(s.name, s.id);
          supplierFilter.add(opt.cloneNode(true));
          document.getElementById('supplier_id').add(opt);
        });
      }
    }

    searchInput.oninput = loadProducts;
    categoryFilter.onchange = loadProducts;
    supplierFilter.onchange = loadProducts;

    document.getElementById('new-product-btn').onclick = () => {
      form.reset();
      document.getElementById('edit-id').value = '';
      document.getElementById('modal-title').textContent = 'Add New Product';
      modal.style.display = 'flex';
    };

    document.getElementById('cancel-btn').onclick = () => modal.style.display = 'none';

    form.onsubmit = async (e) => {
      e.preventDefault();
      const token = sessionStorage.getItem('token');
      const id = document.getElementById('edit-id').value;
      const method = id ? 'PUT' : 'POST';
      const url = id ? `/api/products/${id}` : '/api/products';

      const payload = {
        name: document.getElementById('name').value,
        sku: document.getElementById('sku').value,
        category_id: parseInt(document.getElementById('category_id').value),
        supplier_id: parseInt(document.getElementById('supplier_id').value),
        unit_price: parseFloat(document.getElementById('unit_price').value),
        reorder_level: parseInt(document.getElementById('reorder_level').value),
        unit_of_measure: document.getElementById('unit_of_measure').value,
        track_expiry: document.getElementById('track_expiry').checked
      };

      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        if (result.success) {
          modal.style.display = 'none';
          loadProducts();
        } else {
          alert('Error: ' + result.message);
        }
      } catch (err) { alert('Network error.'); }
    };

    tableBody.onclick = async (e) => {
      if (e.target.classList.contains('delete-btn')) {
        if (!confirm('Are you sure you want to delete this product?')) return;
        const id = e.target.dataset.id;
        const token = sessionStorage.getItem('token');
        const res = await fetch(`/api/products/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if ((await res.json()).success) loadProducts();
      }

      if (e.target.classList.contains('edit-btn')) {
        const id = e.target.dataset.id;
        const token = sessionStorage.getItem('token');
        const res = await fetch(`/api/products/${id}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success) {
          const p = data.data;
          document.getElementById('edit-id').value = p.id;
          document.getElementById('name').value = p.name;
          document.getElementById('sku').value = p.sku;
          document.getElementById('category_id').value = p.category_id;
          document.getElementById('supplier_id').value = p.supplier_id;
          document.getElementById('unit_price').value = p.unit_price;
          document.getElementById('reorder_level').value = p.reorder_level;
          document.getElementById('unit_of_measure').value = p.unit_of_measure;
          document.getElementById('track_expiry').checked = p.track_expiry;
          
          document.getElementById('modal-title').textContent = 'Edit Product';
          modal.style.display = 'flex';
        }
      }
    }

    loadFilters();
    loadProducts();
  </script>
</body>
</html>
