<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Batches | Invex Inventory</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/products.css" />
</head>
<body>
  <!-- Sidebar (loaded dynamically) -->
  <div id="sidebar-placeholder"></div>

<!-- Main Content -->
  <main class="main-content">
    <header class="top-header">
      <div class="header-title">
        <h1>Batches</h1>
        <p>Track product batches and expiry dates</p>
      </div>
      <div class="header-actions">
        <!-- Batches is read-only view -->
      </div>
    </header>

    <section style="padding: 0 32px;">
      <div class="search-bar">
        <input type="text" id="search-input" class="form-control" style="max-width: 280px;" placeholder="Search by product name or SKU…">
        <select id="filter-status" class="form-control" style="max-width: 180px;">
          <option value="">All batches</option>
          <option value="expired">Expired</option>
          <option value="urgent">Expiring (< 30 days)</option>
          <option value="warning">Expiring (30-90 days)</option>
          <option value="ok">Healthy (90+ days)</option>
        </select>
      </div>

      <table id="batches-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Batch #</th>
            <th>Quantity</th>
            <th>Expires</th>
            <th>Status</th>
            <th style="text-align: right;">Days left</th>
          </tr>
        </thead>
        <tbody id="batches-table-body">
          <!-- Data will be loaded here -->
        </tbody>
      </table>
      <div id="loading-state" style="text-align: center; padding: 40px; color: var(--fg-4); font-size: 13px;">Loading batches…</div>
    </section>
  </main>

  <script src="/js/sidebar.js"></script>
  <script type="module" src="/js/batches.js"></script>
</body>
</html>
