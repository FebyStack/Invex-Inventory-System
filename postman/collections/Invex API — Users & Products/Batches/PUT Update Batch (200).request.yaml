$kind: http-request
url: "{{baseUrl}}/batches/{{batchId}}"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{adminToken}}
body:
  type: text
  content: |-
    {
      "quantity": 90
    }
scripts:
  - type: afterResponse
    code: pm.test('Status is 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 5000
