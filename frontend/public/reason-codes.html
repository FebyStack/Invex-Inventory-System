<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reason Codes | Invex Inventory</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/reason-codes.css" />
</head>
<body>
  <!-- Sidebar (loaded dynamically) -->
  <div id="sidebar-placeholder"></div>

<!-- Main Content -->
  <main class="main-content">
    <header class="top-header">
      <div class="header-title">
        <h1>Reason codes</h1>
        <p>Define reasons for manual stock adjustments</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" id="new-code-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New reason
        </button>
      </div>
    </header>

    <section style="padding: 0 32px;">
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Description</th>
            <th>Allows</th>
            <th>Created</th>
            <th style="text-align:right;">Actions</th>
          </tr>
        </thead>
        <tbody id="codes-table-body"></tbody>
      </table>
      <div id="loading-state" class="empty-state">Loading reason codes…</div>
    </section>
  </main>

  <!-- New Modal -->
  <div class="modal" id="code-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>New reason code</h2>
      </div>
      <form id="code-form">
        <div class="form-group">
          <label for="code">Code</label>
          <input type="text" id="code" class="form-control" required placeholder="DAMAGED" style="text-transform: uppercase; font-family: 'DM Mono', monospace;">
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <input type="text" id="description" class="form-control" required placeholder="Product arrived damaged">
        </div>

        <div class="form-group">
          <label for="adjustment_type">Allowed adjustment type</label>
          <select id="adjustment_type" class="form-control" required>
            <option value="BOTH">Both (+/−)</option>
            <option value="INCREASE">Increase only (+)</option>
            <option value="DECREASE">Decrease only (−)</option>
          </select>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary">Create reason</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/sidebar.js"></script>
  <script src="/js/reason-codes.js"></script>
</body>
</html>
