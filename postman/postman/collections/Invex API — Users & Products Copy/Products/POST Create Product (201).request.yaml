$kind: http-request
url: "{{baseUrl}}/products"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{adminToken}}
body:
  type: text
  content: |-
    {
      "name": "Test Product",
      "sku": "TST-001",
      "category_id": 1,
      "supplier_id": 1,
      "unit_price": 150.00,
      "reorder_level": 10,
      "track_expiry": false,
      "unit_of_measure": "pcs"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 201', () => pm.response.to.have.status(201));
      const res = pm.response.json();
      pm.test('Product created', () => {
          pm.expect(res.success).to.be.true;
          pm.expect(res.data).to.have.property('id');
          pm.expect(res.data).to.have.property('sku');
      });
      pm.environment.set('productId', res.data.id);
    language: text/javascript
order: 5000
