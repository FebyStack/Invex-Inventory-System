  <style>
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 450px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .form-control {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      outline: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .status-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      background: rgba(16, 185, 129, 0.1);
      color: var(--accent-success);
    }

    .action-btn {
      padding: 6px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
  </style>
</head>

  <main class="main-content">
    <header class="top-header">
      <div class="header-title">
        <h1>Locations</h1>
        <p>Manage warehouses and stores.</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" id="new-loc-btn">+ Add Location</button>
      </div>
    </header>

    <section class="card">
      <table id="locations-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Address</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="locations-table-body">
          <!-- Data loaded here -->
        </tbody>
      </table>
      <div id="loading-state" style="text-align: center; padding: 40px; color: var(--text-muted);">Loading locations...</div>
    </section>
  </main>

  <!-- Location Modal -->
  <div class="modal" id="location-modal">
    <div class="modal-content">
      <div class="modal-header" style="margin-bottom: 24px;">
        <h2 id="modal-title">Add Location</h2>
      </div>
      <form id="location-form">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label for="name">Location Name</label>
          <input type="text" id="name" class="form-control" required placeholder="e.g. Warehouse A">
        </div>
        <div class="form-group">
          <label for="type">Location Type</label>
          <select id="type" class="form-control" required>
            <option value="WAREHOUSE">Warehouse</option>
            <option value="STORE">Retail Store</option>
            <option value="VIRTUAL">Virtual / Transit</option>
          </select>
        </div>
        <div class="form-group">
          <label for="address">Address</label>
          <textarea id="address" class="form-control" rows="3" placeholder="Full street address..."></textarea>
        </div>

        <div class="modal-footer" style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px;">
          <button type="button" class="btn" style="background: var(--bg-hover);" id="cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Location</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/sidebar.js"></script>
  <script>
    const tableBody = document.getElementById('locations-table-body');
    const loadingState = document.getElementById('loading-state');
    const modal = document.getElementById('location-modal');
    const form = document.getElementById('location-form');

    async function loadLocations() {
      const token = sessionStorage.getItem('token');
      try {
        const res = await fetch('/api/locations', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        loadingState.style.display = 'none';
        if (data.success) {
          tableBody.innerHTML = '';
          data.data.forEach(l => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td style="font-weight: 600;">${l.name}</td>
              <td><span style="font-size: 0.8rem; color: var(--text-secondary);">${l.type}</span></td>
              <td style="color: var(--text-muted); font-size: 0.85rem;">${l.address || 'N/A'}</td>
              <td><span class="status-badge">Active</span></td>
              <td>
                <button class="action-btn edit-btn" data-id="${l.id}">✏️</button>
                <button class="action-btn delete-btn" data-id="${l.id}">🗑️</button>
              </td>
            `;
            tableBody.appendChild(row);
          });
        }
      } catch (err) { loadingState.textContent = 'Failed to load locations.'; }
    }

    document.getElementById('new-loc-btn').onclick = () => {
      form.reset();
      document.getElementById('edit-id').value = '';
      document.getElementById('modal-title').textContent = 'Add Location';
      modal.style.display = 'flex';
    };

    document.getElementById('cancel-btn').onclick = () => modal.style.display = 'none';

    form.onsubmit = async (e) => {
      e.preventDefault();
      const token = sessionStorage.getItem('token');
      const id = document.getElementById('edit-id').value;
      const method = id ? 'PUT' : 'POST';
      const url = id ? `/api/locations/${id}` : '/api/locations';

      const payload = {
        name: document.getElementById('name').value,
        type: document.getElementById('type').value,
        address: document.getElementById('address').value
      };

      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(payload)
        });
        if ((await res.json()).success) {
          modal.style.display = 'none';
          loadLocations();
        }
      } catch (err) { alert('Network error.'); }
    };

    tableBody.onclick = async (e) => {
      const id = e.target.dataset.id;
      const token = sessionStorage.getItem('token');

      if (e.target.classList.contains('delete-btn')) {
        if (!confirm('Delete this location? This might fail if items are stored here.')) return;
        const res = await fetch(`/api/locations/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if ((await res.json()).success) loadLocations();
        else alert('Could not delete location.');
      }

      if (e.target.classList.contains('edit-btn')) {
        const res = await fetch(`/api/locations/${id}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success) {
          const l = data.data;
          document.getElementById('edit-id').value = l.id;
          document.getElementById('name').value = l.name;
          document.getElementById('type').value = l.type;
          document.getElementById('address').value = l.address || '';
          document.getElementById('modal-title').textContent = 'Edit Location';
          modal.style.display = 'flex';
        }
      }
    };

    loadLocations();
  </script>
</body>
