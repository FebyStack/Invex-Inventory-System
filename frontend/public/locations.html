  <main class="main-content">
    <header class="top-header">
      <div class="header-title">
        <h1>Locations</h1>
        <p>Warehouses, stores, and transit points</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" id="new-loc-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add location
        </button>
      </div>
    </header>

    <section style="padding: 0 32px;">
      <table id="locations-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Address</th>
            <th>Status</th>
            <th style="text-align:right;">Actions</th>
          </tr>
        </thead>
        <tbody id="locations-table-body"></tbody>
      </table>
      <div id="loading-state" class="empty-state">Loading locations…</div>
    </section>
  </main>

  <!-- Location Modal -->
  <div class="modal" id="location-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Add location</h2>
      </div>
      <form id="location-form">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" class="form-control" required placeholder="Warehouse A">
        </div>
        <div class="form-group">
          <label for="type">Type</label>
          <select id="type" class="form-control" required>
            <option value="WAREHOUSE">Warehouse</option>
            <option value="STORE">Retail store</option>
            <option value="VIRTUAL">Virtual / transit</option>
          </select>
        </div>
        <div class="form-group">
          <label for="address">Address</label>
          <textarea id="address" class="form-control" rows="3" placeholder="Full street address"></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save location</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/sidebar.js"></script>
  <script>
    const tableBody = document.getElementById('locations-table-body');
    const loadingState = document.getElementById('loading-state');
    const modal = document.getElementById('location-modal');
    const form = document.getElementById('location-form');

    async function loadLocations() {
      const token = sessionStorage.getItem('token');
      try {
        const res = await fetch('/api/locations', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        loadingState.style.display = 'none';
        if (data.success) {
          tableBody.innerHTML = '';
          data.data.forEach(l => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td style="font-weight: 500; color: var(--fg-1);">${l.name}</td>
              <td><span class="type-pill">${l.type}</span></td>
              <td style="color: var(--fg-3);">${l.address || '—'}</td>
              <td><span class="status-badge status-in-stock">Active</span></td>
              <td style="text-align: right;">
                <button class="action-btn edit-btn" data-id="${l.id}" title="Edit">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/></svg>
                </button>
                <button class="action-btn delete-btn" data-id="${l.id}" title="Delete">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
                </button>
              </td>
            `;
            tableBody.appendChild(row);
          });
        }
      } catch (err) { loadingState.textContent = 'Failed to load locations.'; }
    }

    document.getElementById('new-loc-btn').onclick = () => {
      form.reset();
      document.getElementById('edit-id').value = '';
      document.getElementById('modal-title').textContent = 'Add location';
      modal.style.display = 'flex';
    };

    document.getElementById('cancel-btn').onclick = () => modal.style.display = 'none';

    form.onsubmit = async (e) => {
      e.preventDefault();
      const token = sessionStorage.getItem('token');
      const id = document.getElementById('edit-id').value;
      const method = id ? 'PUT' : 'POST';
      const url = id ? `/api/locations/${id}` : '/api/locations';

      const payload = {
        name: document.getElementById('name').value,
        type: document.getElementById('type').value,
        address: document.getElementById('address').value
      };

      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(payload)
        });
        if ((await res.json()).success) {
          modal.style.display = 'none';
          loadLocations();
        }
      } catch (err) { alert('Network error.'); }
    };

    tableBody.onclick = async (e) => {
      const btn = e.target.closest('button[data-id]');
      if (!btn) return;
      const id = btn.dataset.id;
      const token = sessionStorage.getItem('token');

      if (btn.classList.contains('delete-btn')) {
        if (!confirm('Delete this location? This might fail if items are stored here.')) return;
        const res = await fetch(`/api/locations/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if ((await res.json()).success) loadLocations();
        else alert('Could not delete location.');
      }

      if (btn.classList.contains('edit-btn')) {
        const res = await fetch(`/api/locations/${id}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success) {
          const l = data.data;
          document.getElementById('edit-id').value = l.id;
          document.getElementById('name').value = l.name;
          document.getElementById('type').value = l.type;
          document.getElementById('address').value = l.address || '';
          document.getElementById('modal-title').textContent = 'Edit location';
          modal.style.display = 'flex';
        }
      }
    };

    loadLocations();
  </script>
</body>
