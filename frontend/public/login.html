<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invex — Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg: #0A0A0B;
          --surface: #121214;
          --surface-elev: #17171A;
          --border: rgba(255,255,255,0.06);
          --border-strong: rgba(255,255,255,0.10);
          --fg-1: #F5F5F7;
          --fg-2: #B4B4B8;
          --fg-3: #8A8A8E;
          --fg-4: #5A5A5F;
          --hover: rgba(255,255,255,0.03);
          --danger: #F87171;
        }
        body.light {
          --bg: #FAFAF7;
          --surface: #FFFFFF;
          --surface-elev: #FFFFFF;
          --border: rgba(0,0,0,0.06);
          --border-strong: rgba(0,0,0,0.10);
          --fg-1: #0A0A0B;
          --fg-2: #3A3A3F;
          --fg-3: #6A6A6F;
          --fg-4: #9A9A9F;
          --hover: rgba(0,0,0,0.025);
          --danger: #DC2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--fg-1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
            transition: background 200ms ease, color 200ms ease;
            letter-spacing: -0.005em;
        }

        .login-card {
            width: 100%;
            max-width: 360px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            background: var(--fg-1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon::after {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--bg);
            border-radius: 2px;
        }
        .brand span {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--fg-1);
        }

        h1 {
            font-size: 26px;
            font-weight: 400;
            color: var(--fg-1);
            letter-spacing: -0.035em;
            margin-bottom: 6px;
        }

        .sub {
            color: var(--fg-3);
            font-size: 13px;
            margin-bottom: 32px;
        }

        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: var(--fg-3);
            text-transform: uppercase;
            letter-spacing: 0.02em;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            height: 38px;
            padding: 0 12px;
            background: transparent;
            border: 1px solid var(--border-strong);
            border-radius: 6px;
            color: var(--fg-1);
            font-family: inherit;
            font-size: 13px;
            transition: border-color 150ms ease;
            outline: none;
        }
        .form-group input:focus { border-color: var(--fg-2); }

        .btn {
            width: 100%;
            height: 42px;
            background: var(--fg-1);
            color: var(--bg);
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 150ms ease;
            margin-top: 16px;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #error-msg {
            background: transparent;
            border: 1px solid var(--border-strong);
            color: var(--danger);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 14px;
            display: none;
        }

        .footer {
            margin-top: 28px;
            font-size: 11px;
            color: var(--fg-4);
            text-align: left;
        }
        .footer a {
            color: var(--fg-2);
            text-decoration: none;
            transition: color 150ms;
        }
        .footer a:hover { color: var(--fg-1); }

        .loader {
            width: 14px;
            height: 14px;
            border: 1.5px solid rgba(0,0,0,0.2);
            border-radius: 50%;
            border-top-color: var(--bg);
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .theme-mini {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 3px;
            gap: 2px;
        }
        .theme-mini button {
            border: none;
            background: transparent;
            color: var(--fg-3);
            border-radius: 5px;
            padding: 6px 8px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .theme-mini button.active {
            background: var(--surface-elev);
            color: var(--fg-1);
            border: 1px solid var(--border);
        }
        .theme-mini svg {
            width: 12px;
            height: 12px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>
    <div class="theme-mini" id="theme-mini">
        <button data-theme="dark" title="Dark">
            <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button data-theme="light" title="Light">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
    </div>

    <div class="login-card">
        <div class="brand">
            <div class="logo-icon"></div>
            <span>Invex</span>
        </div>

        <h1>Sign in</h1>
        <p class="sub">Welcome back. Let's get your stock under control.</p>

        <div id="error-msg"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autocomplete="username" placeholder="jane">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn" id="submit-btn">
                <span id="btn-text">Sign in</span>
                <div class="loader" id="btn-loader"></div>
            </button>
        </form>

        <div class="footer">
            Don't have an account? <a href="register.html">Create one</a>
        </div>
    </div>

    <script>
        // Theme persistence
        const applyTheme = (t) => {
            if (t === 'light') document.body.classList.add('light');
            else document.body.classList.remove('light');
            try { localStorage.setItem('invex_theme', t); } catch {}
            document.querySelectorAll('#theme-mini button').forEach(b => {
                b.classList.toggle('active', b.dataset.theme === t);
            });
        };
        const stored = (() => { try { return localStorage.getItem('invex_theme'); } catch { return null; } })();
        applyTheme(stored || 'dark');
        document.querySelectorAll('#theme-mini button').forEach(b => {
            b.addEventListener('click', () => applyTheme(b.dataset.theme));
        });

        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    sessionStorage.setItem('token', data.token);
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    errorMsg.textContent = data.message || 'Sign-in failed. Please try again.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Unable to connect to server.';
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
