$kind: http-request
url: "{{baseUrl}}/products"
method: GET
headers:
  Authorization: Bearer {{adminToken}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', () => pm.response.to.have.status(200));
      pm.test('Returns array', () => {
          pm.expect(pm.response.json().data).to.be.an('array');
      });
    language: text/javascript
order: 1000
