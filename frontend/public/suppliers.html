<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suppliers | Invex Inventory</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
</head>
<body>
  <!-- Sidebar (loaded dynamically) -->
  <div id="sidebar-placeholder"></div>

<main class="main-content">
    <header class="top-header">
      <div class="header-title">
        <h1>Suppliers</h1>
        <p>Vendor contacts and details</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" id="new-supplier-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New supplier
        </button>
      </div>
    </header>

    <section style="padding: 32px;">
      <!-- Search -->
      <div class="search-bar">
        <input type="text" id="search-input" class="form-control" placeholder="Search suppliers…" style="max-width: 280px;">
      </div>

      <!-- Table -->
      <table>
        <thead>
          <tr>
            <th>Company</th>
            <th>Contact person</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Location</th>
            <th style="text-align:right;"></th>
          </tr>
        </thead>
        <tbody id="suppliers-table-body">
          <tr id="loading-state">
            <td colspan="6" style="text-align:center;padding:40px;color:var(--fg-4);font-size:13px;">Loading suppliers…</td>
          </tr>
        </tbody>
      </table>

      <!-- Empty state -->
      <div id="empty-state" style="display:none;text-align:center;padding:60px 20px;color:var(--fg-4);">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3;margin-bottom:12px;"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>
        <div style="font-size:14px;font-weight:500;margin-bottom:4px;">No suppliers yet</div>
        <div style="font-size:12px;">Add your first supplier to start receiving stock.</div>
      </div>
    </section>
  </main>

  <!-- Modal -->
  <div class="modal" id="supplier-modal">
    <div class="modal-content" style="max-width: 620px;">
      <div class="modal-header">
        <h2 id="modal-title">New supplier</h2>
      </div>
      <form id="supplier-form">
        <input type="hidden" id="edit-id">

        <div class="form-group">
          <label for="sup-name">Company name</label>
          <input type="text" id="sup-name" class="form-control" required placeholder="e.g. Fisher Scientific, Merck PH">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label for="sup-contact">Contact person <span style="color:var(--fg-4);font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
            <input type="text" id="sup-contact" class="form-control" placeholder="Full name">
          </div>
          <div class="form-group">
            <label for="sup-phone">Phone <span style="color:var(--fg-4);font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
            <input type="text" id="sup-phone" class="form-control" placeholder="+63 912 345 6789">
          </div>
        </div>

        <div class="form-group">
          <label for="sup-email">Email <span style="color:var(--fg-4);font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
          <input type="email" id="sup-email" class="form-control" placeholder="contact@supplier.com">
        </div>

        <div class="form-group">
          <label for="sup-address">Street address <span style="color:var(--fg-4);font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
          <input type="text" id="sup-address" class="form-control" placeholder="Building, street, unit">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label for="sup-barangay">Barangay</label>
            <input type="text" id="sup-barangay" class="form-control" placeholder="Barangay">
          </div>
          <div class="form-group">
            <label for="sup-city">City / Municipality</label>
            <input type="text" id="sup-city" class="form-control" placeholder="City">
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label for="sup-province">Province</label>
            <input type="text" id="sup-province" class="form-control" placeholder="Province">
          </div>
          <div class="form-group">
            <label for="sup-postal">Postal code</label>
            <input type="text" id="sup-postal" class="form-control" placeholder="e.g. 6000">
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/sidebar.js"></script>
  <script src="/js/suppliers.js"></script>
</body>
</html>
