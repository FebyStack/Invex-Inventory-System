$kind: http-request
name: DELETE /api/products/:id
url: "{{baseUrl}}/api/products/{{productId}}"
method: DELETE
auth:
  type: bearer
  bearer:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();

      pm.test('Status is 200', function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
order: 5000
