$kind: http-request
url: "{{baseUrl}}/adjustments"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{adminToken}}
body:
  type: text
  content: |-
    {
      "product_id": 1,
      "location_id": 1,
      "adjustment_type": "INCREASE",
      "quantity_change": 5
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 400', () => pm.response.to.have.status(400));
      pm.test('Error mentions required fields', () => pm.expect(pm.response.json().message).to.include('required'));
    language: text/javascript
order: 2000
