$kind: http-request
name: PUT /api/batches/:id
url: "{{baseUrl}}/api/batches/{{batchId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "quantity": 100
    }
auth:
  type: bearer
  bearer:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
order: 5000
