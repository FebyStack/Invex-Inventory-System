$kind: http-request
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "username": "admin",
      "password": "admin123"
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.success && res.token) {
          pm.environment.set('adminToken', res.token);
          pm.test('Login successful — token saved', () => pm.expect(res.success).to.be.true);
      } else {
          pm.test('Login failed', () => pm.expect.fail(res.message));
      }
    language: text/javascript
order: 1000
