$kind: http-request
url: "{{baseUrl}}/batches/expiring?days=30"
method: GET
headers:
  Authorization: Bearer {{adminToken}}
queryParams:
  days: "30"
scripts:
  - type: afterResponse
    code: pm.test('Status is 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 2000
