$kind: http-request
url: "{{baseUrl}}/adjustments"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{adminToken}}
body:
  type: text
  content: |-
    {
      "product_id": 1,
      "location_id": 1,
      "adjustment_type": "INCREASE",
      "quantity_change": 5,
      "reason_code_id": 6,
      "notes": "Found items during recount"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 201', () => pm.response.to.have.status(201));
      const res = pm.response.json();
      pm.environment.set('adjustmentId', res.data.id);
    language: text/javascript
order: 1000
