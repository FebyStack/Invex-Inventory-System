$kind: http-request
url: "{{baseUrl}}/adjustments"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{adminToken}}
body:
  type: text
  content: |-
    {
      "product_id": 1,
      "location_id": 1,
      "adjustment_type": "INCREASE",
      "quantity_change": 5,
      "reason_code_id": 1,
      "notes": "Trying to INCREASE with DAMAGED (DECREASE only)"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 400', () => pm.response.to.have.status(400));
      pm.test('Error mentions type mismatch', () => pm.expect(pm.response.json().message).to.include('only allows'));
    language: text/javascript
order: 4000
