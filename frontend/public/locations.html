<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Locations | Invex Inventory</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/locations.css" />
</head>
<body>
  <!-- Sidebar (loaded dynamically) -->
  <div id="sidebar-placeholder"></div>

<main class="main-content">
    <header class="top-header">
      <div class="header-title">
        <h1>Locations</h1>
        <p id="header-sub">Warehouses, stores, and inventory points</p>
      </div>
      <div class="header-actions">
        <button class="btn" id="export-btn" title="Export inventory">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
        <button class="btn btn-primary" id="receive-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span id="receive-btn-label">Receive stock</span>
        </button>
      </div>
    </header>

    <section class="loc-shell">
      <!-- Selector chips -->
      <div class="loc-selector" id="loc-selector">
        <div class="empty-state" style="padding: 16px 0;">Loading locations…</div>
      </div>

      <!-- Headline -->
      <div class="loc-headline" id="loc-headline" style="display: none;">
        <div>
          <div class="loc-eyebrow" id="loc-eyebrow"></div>
          <div class="loc-title">
            <span class="dot" id="loc-title-dot"></span>
            <span id="loc-title-name"></span>
          </div>
          <div class="loc-meta" id="loc-title-meta"></div>
        </div>
      </div>

      <!-- Stats -->
      <div class="loc-stats" id="loc-stats" style="display: none;"></div>

      <!-- Body: either breakdown table + matrix, or single inventory -->
      <div id="loc-body"></div>
    </section>
  </main>

  <!-- Add Location Modal -->
  <div class="modal" id="add-loc-modal">
    <div class="modal-content" style="max-width: 480px;">
      <div class="modal-header" style="display: flex; align-items: center; justify-content: space-between;">
        <div>
          <h2>New location</h2>
          <p style="font-size: 11px; color: var(--fg-4); margin-top: 2px;">Add a warehouse, store, or storeroom</p>
        </div>
        <button type="button" class="action-btn" id="add-loc-close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="add-loc-success" class="modal-success" style="display: none;">
        <div class="check">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="title">Location created</div>
        <div class="sub" id="add-loc-success-sub"></div>
      </div>
      <form id="add-loc-form">
        <div class="form-grid">
          <div class="form-group span-2">
            <label for="al-name">Location name</label>
            <input type="text" id="al-name" class="form-control" placeholder="Main Warehouse" required>
          </div>
          <div class="form-group">
            <label for="al-code">Code</label>
            <input type="text" id="al-code" class="form-control" placeholder="MW-01" readonly>
          </div>
          <div class="form-group">
            <label for="al-type">Type</label>
            <select id="al-type" class="form-control">
              <option value="warehouse">Warehouse</option>
              <option value="store">Retail store</option>
              <option value="storeroom">Storeroom</option>
            </select>
          </div>
          <div class="form-group span-2">
            <label for="al-address">Address line</label>
            <input type="text" id="al-address" class="form-control" placeholder="123 Main Street">
          </div>
          <div class="form-group">
            <label for="al-barangay">Barangay</label>
            <input type="text" id="al-barangay" class="form-control" placeholder="San Jose">
          </div>
          <div class="form-group">
            <label for="al-city">City</label>
            <input type="text" id="al-city" class="form-control" placeholder="Zamboanga City">
          </div>
          <div class="form-group">
            <label for="al-province">Province</label>
            <input type="text" id="al-province" class="form-control" placeholder="Zamboanga del Sur">
          </div>
          <div class="form-group">
            <label for="al-postal">Postal code</label>
            <input type="text" id="al-postal" class="form-control" placeholder="7000" maxlength="10">
          </div>
          <div class="form-group span-2">
            <label>Color</label>
            <div class="color-picker" id="al-color-picker"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="add-loc-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Create location</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Import Stock Modal -->
  <div class="modal" id="import-modal">
    <div class="modal-content" style="max-width: 560px;">
      <div class="modal-header" style="display: flex; align-items: center; justify-content: space-between;">
        <div>
          <h2 id="import-modal-title">Receive stock</h2>
          <p style="font-size: 11px; color: var(--fg-4); margin-top: 2px;">Receive units into one or many locations</p>
        </div>
        <button type="button" class="action-btn" id="import-close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="import-success" class="modal-success" style="display: none;">
        <div class="check">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="title" id="import-success-title">Imported units</div>
        <div class="sub" id="import-success-sub"></div>
      </div>
      <form id="import-form">
        <div style="display: flex; flex-direction: column; gap: 18px;">
          <div class="form-group" style="margin: 0;">
            <label for="im-product">Product</label>
            <select id="im-product" class="form-control" required></select>
          </div>

          <div>
            <label style="display: block; margin-bottom: 8px; font-size: 11px; font-weight: 500; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.02em;">Distribute to</label>
            <div class="toggle-bar" id="im-mode">
              <button type="button" data-mode="single" class="active">Single location</button>
              <button type="button" data-mode="multi">Multiple locations</button>
            </div>
          </div>

          <div id="im-single-pane" style="display: grid; grid-template-columns: 1fr 140px; gap: 16px;">
            <div class="form-group" style="margin: 0;">
              <label for="im-loc">Location</label>
              <select id="im-loc" class="form-control"></select>
            </div>
            <div class="form-group" style="margin: 0;">
              <label for="im-qty">Quantity</label>
              <input type="number" id="im-qty" class="form-control" min="0" placeholder="0">
            </div>
          </div>

          <div id="im-multi-pane" style="display: none;">
            <label style="display: block; margin-bottom: 8px; font-size: 11px; font-weight: 500; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.02em;">Locations &amp; quantities</label>
            <div class="multi-loc-list" id="im-multi-list"></div>
          </div>

          <div class="total-preview" style="flex-direction: column; gap: 6px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span class="label">Current stock</span>
              <span class="value" id="im-current-stock" style="font-size: 13px; color: var(--fg-3);">0</span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span class="label">Quantity to add</span>
              <span class="value" id="im-total" style="font-size: 13px; color: var(--success);">+0</span>
            </div>
            <div style="border-top: 1px solid var(--border); padding-top: 6px; display: flex; justify-content: space-between; align-items: center;">
              <span class="label" style="font-weight: 600; color: var(--fg-2);">New total</span>
              <span class="value" id="im-new-total" style="font-weight: 600; color: var(--fg-1);">0</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="import-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="import-submit" disabled>Import 0 units</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/sidebar.js"></script>
  <script src="/js/locations.js"></script>
</body>
</html>
