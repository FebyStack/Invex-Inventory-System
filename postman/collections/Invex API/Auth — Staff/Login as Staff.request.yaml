$kind: http-request
url: "{{baseUrl}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "staff_user",
      "password": "Staff@123"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();

      pm.test('Status is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('res.token is a string', function () {
          pm.expect(res.token).to.be.a('string');
      });

      pm.test('Role is staff', function () {
          pm.expect(res.user.role).to.eql('staff');
      });

      if (res.token) {
          pm.globals.set('staffToken', res.token);
          console.log('✅ Staff token saved to Globals');
      }
    language: text/javascript
order: 2000
