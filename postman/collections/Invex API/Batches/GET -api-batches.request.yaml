$kind: http-request
name: GET /api/batches
url: "{{baseUrl}}/api/batches"
method: GET
auth:
  type: bearer
  bearer:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
order: 1000
