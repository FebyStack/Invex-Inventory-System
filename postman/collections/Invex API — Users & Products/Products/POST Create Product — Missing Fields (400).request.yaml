$kind: http-request
url: "{{baseUrl}}/products"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{adminToken}}
body:
  type: text
  content: |-
    {
      "name": "Incomplete Product"
    }
scripts:
  - type: afterResponse
    code: pm.test('Status is 400', () => pm.response.to.have.status(400));
    language: text/javascript
order: 6000
