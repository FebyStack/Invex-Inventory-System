<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invex — Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-orbs" aria-hidden="true">
        <span class="orb orb-1"></span>
        <span class="orb orb-2"></span>
        <span class="orb orb-3"></span>
    </div>

    <div class="theme-mini" id="theme-mini">
        <button data-theme="dark" title="Dark">
            <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button data-theme="light" title="Light">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
    </div>

    <div class="login-card">
        <div class="brand">
            <div class="logo-icon"></div>
            <span>Invex</span>
        </div>

        <h1>Sign in</h1>
        <p class="sub">Welcome back. Let's get your stock under control.</p>

        <div id="error-msg"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autocomplete="username" placeholder="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn" id="submit-btn">
                <span id="btn-text">Sign in</span>
                <div class="loader" id="btn-loader"></div>
            </button>
        </form>

        <div class="footer">
            Don't have an account? <a href="register.html">Create one</a>
        </div>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
