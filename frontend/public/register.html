<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invex — Create account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/register.css" />
</head>
<body>
    <div class="theme-mini" id="theme-mini">
        <button data-theme="dark" title="Dark">
            <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button data-theme="light" title="Light">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
    </div>

    <div class="card">
        <div class="brand">
            <div class="logo-icon"></div>
            <span>Invex</span>
        </div>

        <h1>Create account</h1>
        <p class="sub">Join the Invex Inventory System</p>

        <div id="error-msg" class="alert"></div>
        <div id="success-msg" class="alert"></div>

        <form id="register-form">
            <div class="form-group">
                <label for="full_name">Full name</label>
                <input type="text" id="full_name" required placeholder="Jane Doe">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="jane@acme.co">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="janedoe">
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" required>
                        <option value="staff">Staff</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••" minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm</label>
                    <input type="password" id="confirm_password" required placeholder="••••••••" minlength="6">
                </div>
            </div>

            <button type="submit" class="btn" id="submit-btn">
                <span id="btn-text">Create account</span>
                <div class="loader" id="btn-loader"></div>
            </button>
        </form>

        <div class="footer">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script src="/js/register.js"></script>
</body>
</html>
