$kind: http-request
url: "{{baseUrl}}/locations/{{locationId}}"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{adminToken}}
body:
  type: text
  content: |-
    {
      "name": "Updated Warehouse"
    }
scripts:
  - type: afterResponse
    code: pm.test('Status is 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 4000
