$kind: http-request
name: GET /api/categories/:id
url: "{{baseUrl}}/api/categories/{{categoryId}}"
method: GET
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();

      pm.test('Status is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('res.success === true', function () {
          pm.expect(res.success).to.be.true;
      });

      pm.test('res.category.id matches categoryId env var', function () {
          pm.expect(String(res.category.id)).to.eql(String(pm.collectionVariables.get('categoryId')));
      });
    language: text/javascript
order: 3000
