<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products | Invex Inventory</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/products.css" />
</head>

<body>
  <!-- Sidebar (loaded dynamically) -->
  <div id="sidebar-placeholder"></div>

  <main class="main-content">
    <header class="top-header">
      <div class="header-title">
        <h1>Products</h1>
        <p>Manage your inventory catalog</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" id="new-product-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          New product
        </button>
      </div>
    </header>

    <section style="padding: 0 32px;">
      <div class="search-bar">
        <input type="text" id="search-input" class="form-control" style="max-width: 280px;"
          placeholder="Search by name or SKU…">
        <select id="filter-category" class="form-control" style="max-width: 180px;">
          <option value="">All categories</option>
        </select>
        <select id="filter-supplier" class="form-control" style="max-width: 180px;">
          <option value="">All suppliers</option>
        </select>
      </div>

      <table id="products-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Category</th>
            <th style="text-align: right;">Price</th>
            <th>Stock</th>
            <th style="text-align: right;">Actions</th>
          </tr>
        </thead>
        <tbody id="products-table-body">
          <!-- Data will be loaded here -->
        </tbody>
      </table>
      <div id="loading-state" style="text-align: center; padding: 40px; color: var(--fg-4); font-size: 13px;">Loading
        catalog…</div>
    </section>
  </main>

  <!-- Product Modal -->
  <div class="modal" id="product-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">New product</h2>
      </div>
      <form id="product-form">
        <input type="hidden" id="edit-id">

        <div class="form-grid" style="grid-template-columns: 1fr;">
          <div class="form-group">
            <label for="name">Product name</label>
            <input type="text" id="name" class="form-control" required placeholder="Wireless Mouse M1">
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Locations</label>
            <div class="multi-select-wrap" id="location-picker">
              <button type="button" class="form-control multi-select-btn" id="location-picker-btn">
                <span id="location-picker-label">Select locations</span>
                <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 1l4 4 4-4" />
                </svg>
              </button>
              <div class="multi-select-dropdown" id="location-dropdown" style="display:none;">
                <div id="location-options"></div>
              </div>
            </div>
            <div class="sku-preview" id="sku-preview">SKU will be generated from the first selected location.</div>
          </div>
          <div class="form-group">
            <label for="category_id">Category</label>
            <select id="category_id" class="form-control" required>
              <option value="">Select category</option>
            </select>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="supplier_id">Supplier <span
                style="color:var(--fg-4);font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
            <select id="supplier_id" class="form-control">
              <option value="">None</option>
            </select>
          </div>
          <div class="form-group">
            <label for="unit_of_measure">Unit</label>
            <input type="text" id="unit_of_measure" class="form-control" list="unit-options" required value="pcs" placeholder="e.g. pcs, box, kg">
            <datalist id="unit-options">
              <option value="pcs">Pieces</option>
              <option value="box">Box / Case</option>
              <option value="kg">Kilograms</option>
              <option value="grams">Grams</option>
              <option value="liters">Liters</option>
              <option value="packs">Packs</option>
              <option value="units">Units</option>
              <option value="rolls">Rolls</option>
              <option value="set">Set</option>
            </datalist>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="unit_price">Unit price (₱)</label>
            <input type="number" id="unit_price" class="form-control" required step="0.01" min="0" placeholder="0.00">
          </div>
          <div class="form-group">
            <label for="reorder_level">Reorder level</label>
            <input type="number" id="reorder_level" class="form-control" required min="0" value="10">
          </div>
        </div>

        <div class="form-grid" id="initial-qty-row">
          <div class="form-group">
            <label for="initial_quantity">Initial quantity</label>
            <input type="number" id="initial_quantity" class="form-control" min="0" value="0" placeholder="0">
            <div style="margin-top: 4px; font-size: 11px; color: var(--fg-4);">Stock to add at the selected location(s).</div>
          </div>
          <div class="form-group">
            <!-- Empty column for balance -->
          </div>
        </div>

        <div style="margin: 20px 0 10px 0; height: 1px; background: var(--border);"></div>

        <div class="form-group" style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
          <input type="checkbox" id="track_expiry" checked style="width:auto;height:auto;cursor:pointer;">
          <label for="track_expiry"
            style="margin: 0; text-transform: none; letter-spacing: 0; font-size: 13px; color: var(--fg-2); font-weight: 400;">Track
            expiry dates</label>
        </div>

        <div class="form-group" id="expiry-date-group">
          <label for="expiry_date">Expiry date <span
              style="color: var(--fg-4); font-weight: 400; text-transform: none; letter-spacing: 0;">(optional)</span></label>
          <input type="date" id="expiry_date" class="form-control">
          <div style="margin-top: 4px; font-size: 11px; color: var(--fg-4);">Leave blank if unknown — you can add expiry
            via batches later.</div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="save-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/sidebar.js"></script>
  <script src="/js/products.js"></script>
</body>

</html>
