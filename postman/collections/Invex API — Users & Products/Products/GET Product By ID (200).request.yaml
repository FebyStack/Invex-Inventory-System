$kind: http-request
url: "{{baseUrl}}/products/{{productId}}"
method: GET
headers:
  Authorization: Bearer {{adminToken}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', () => pm.response.to.have.status(200));
      pm.test('Has product data', () => {
          const res = pm.response.json();
          pm.expect(res.data).to.have.property('sku');
          pm.expect(res.data).to.have.property('category_name');
      });
    language: text/javascript
order: 8000
